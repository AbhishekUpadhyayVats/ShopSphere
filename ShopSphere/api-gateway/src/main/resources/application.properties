spring.application.name=api-gateway

# Port
server.port=8080

# Enable service discovery routing
spring.cloud.gateway.server.webflux.discovery.locator.enabled=true

# Eureka Config
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/



# Auth Service
spring.cloud.gateway.server.webflux.routes[0].id=auth-service
spring.cloud.gateway.server.webflux.routes[0].uri=lb://AUTH-SERVICE
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/gateway/auth/**
spring.cloud.gateway.server.webflux.routes[0].filters[0]=StripPrefix=2

#Admin Service
spring.cloud.gateway.server.webflux.routes[1].id=admin-service
spring.cloud.gateway.server.webflux.routes[1].uri=lb://ADMIN-SERVICE
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/gateway/admin/**
#removing {/gateway} from path before sending to next service
spring.cloud.gateway.server.webflux.routes[1].filters[0]=StripPrefix=1  

#Auth Service
spring.cloud.gateway.server.webflux.routes[2].id=catalog-service
spring.cloud.gateway.server.webflux.routes[2].uri=lb://CATALOG-SERVICE
spring.cloud.gateway.server.webflux.routes[2].predicates[0]=Path=/gateway/catalog/**
spring.cloud.gateway.server.webflux.routes[2].filters[0]=StripPrefix=2


#Order Service
spring.cloud.gateway.server.webflux.routes[3].id=order-service
spring.cloud.gateway.server.webflux.routes[3].uri=lb://ORDER-SERVICE
spring.cloud.gateway.server.webflux.routes[3].predicates[0]=Path=/gateway/order/**
spring.cloud.gateway.server.webflux.routes[3].filters[0]=StripPrefix=2


